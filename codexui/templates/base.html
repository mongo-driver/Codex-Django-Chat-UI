<!DOCTYPE html>
<html lang="en" data-theme="{{ theme|default:'dark' }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Codex UI{% endblock %}</title>
    <style>
        :root {
            --bg: #0f141c;
            --bg-soft: #151d29;
            --panel: #1b2533;
            --panel-2: #111823;
            --line: #2c3a4d;
            --text: #e7edf7;
            --muted: #9db0c8;
            --accent: #4ec0ff;
            --ok: #4cd790;
            --err: #ff7676;
            --warn: #ffd17a;
            --shadow: rgba(0, 0, 0, 0.35);
        }
        html[data-theme="light"] {
            --bg: #eff4fa;
            --bg-soft: #e6edf6;
            --panel: #ffffff;
            --panel-2: #f8fbff;
            --line: #c7d5e8;
            --text: #17212d;
            --muted: #4f6074;
            --accent: #0f6b9f;
            --ok: #0c7c49;
            --err: #b4232d;
            --warn: #9a6500;
            --shadow: rgba(30, 53, 82, 0.1);
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            color: var(--text);
            background:
                radial-gradient(1000px 500px at 10% -10%, rgba(78, 192, 255, 0.12), transparent 55%),
                radial-gradient(900px 500px at 100% 0%, rgba(19, 128, 196, 0.1), transparent 60%),
                var(--bg);
            font-family: "Segoe UI", "Noto Sans", Arial, sans-serif;
        }
        .shell {
            max-width: 1400px;
            margin: 0 auto;
            padding: 16px;
        }
        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 14px;
        }
        .brand {
            font-size: 28px;
            margin: 0;
            letter-spacing: .3px;
        }
        .layout {
            display: grid;
            gap: 14px;
            grid-template-columns: 300px 1fr;
        }
        @media (max-width: 980px) {
            .layout {
                grid-template-columns: 1fr;
            }
        }
        .panel {
            background: linear-gradient(180deg, var(--panel) 0%, var(--panel-2) 100%);
            border: 1px solid var(--line);
            border-radius: 14px;
            box-shadow: 0 14px 30px var(--shadow);
            padding: 14px;
        }
        .btn {
            border: 1px solid color-mix(in srgb, var(--accent) 75%, black 15%);
            background: linear-gradient(180deg, color-mix(in srgb, var(--accent) 95%, white 8%) 0%, color-mix(in srgb, var(--accent) 75%, black 20%) 100%);
            color: #ffffff;
            border-radius: 10px;
            padding: 8px 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }
        .btn.secondary {
            background: linear-gradient(180deg, color-mix(in srgb, var(--accent) 85%, white 3%) 0%, color-mix(in srgb, var(--accent) 55%, black 20%) 100%);
        }
        .btn.subtle {
            background: transparent;
            border-color: var(--line);
            color: var(--text);
        }
        .btn.danger {
            color: var(--err);
            border-color: color-mix(in srgb, var(--err) 50%, var(--line) 50%);
        }
        .btn.full { width: 100%; }
        input, select, textarea {
            width: 100%;
            background: color-mix(in srgb, var(--panel) 90%, black 5%);
            color: var(--text);
            border: 1px solid var(--line);
            border-radius: 9px;
            padding: 8px 10px;
            font-size: 14px;
        }
        textarea { min-height: 84px; resize: vertical; }
        code {
            background: color-mix(in srgb, var(--panel) 70%, black 15%);
            border: 1px solid var(--line);
            border-radius: 6px;
            padding: 1px 5px;
            font-size: 12px;
        }
        pre {
            margin: 0;
            white-space: pre-wrap;
            word-break: break-word;
            font-size: 12px;
            border: 1px solid var(--line);
            border-radius: 10px;
            padding: 10px;
            background: color-mix(in srgb, var(--panel) 70%, black 20%);
            color: var(--text);
        }
        .sidebar { display: flex; flex-direction: column; gap: 12px; min-height: 80vh; }
        .section-title { margin: 0; font-size: 17px; }
        .new-chat-form {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 8px;
        }
        .chat-list { display: grid; gap: 8px; max-height: 48vh; overflow: auto; }
        .chat-row { margin: 0; }
        .chat-switch {
            width: 100%;
            text-align: left;
            border: 1px solid var(--line);
            background: color-mix(in srgb, var(--panel) 85%, black 10%);
            color: var(--text);
            border-radius: 10px;
            padding: 8px;
            cursor: pointer;
            display: grid;
            gap: 3px;
        }
        .chat-row.active .chat-switch {
            border-color: color-mix(in srgb, var(--accent) 65%, var(--line) 35%);
            background: color-mix(in srgb, var(--accent) 18%, var(--panel) 82%);
        }
        .chat-name { font-weight: 700; font-size: 13px; }
        .chat-meta { color: var(--muted); font-size: 11px; }
        .sidebar-actions { display: grid; gap: 8px; }
        .mini-status {
            border-top: 1px solid var(--line);
            padding-top: 8px;
            color: var(--muted);
            font-size: 12px;
            display: grid;
            gap: 5px;
        }
        .chat-main {
            display: flex;
            flex-direction: column;
            gap: 12px;
            min-height: 80vh;
        }
        .chat-header {
            border-bottom: 1px solid var(--line);
            padding-bottom: 8px;
            display: grid;
            gap: 8px;
        }
        .page-title { margin: 0; font-size: 20px; }
        .metric-row { display: flex; flex-wrap: wrap; gap: 8px; }
        .chip {
            border: 1px solid var(--line);
            background: color-mix(in srgb, var(--panel) 90%, var(--accent) 10%);
            color: var(--muted);
            border-radius: 999px;
            font-size: 12px;
            padding: 4px 9px;
        }
        .alert {
            border-radius: 10px;
            padding: 8px 10px;
            border: 1px solid transparent;
            font-size: 13px;
        }
        .alert.ok {
            color: var(--ok);
            border-color: color-mix(in srgb, var(--ok) 30%, var(--line) 70%);
            background: color-mix(in srgb, var(--ok) 10%, var(--panel) 90%);
        }
        .alert.err {
            color: var(--err);
            border-color: color-mix(in srgb, var(--err) 30%, var(--line) 70%);
            background: color-mix(in srgb, var(--err) 10%, var(--panel) 90%);
        }
        .messages {
            border: 1px solid var(--line);
            border-radius: 12px;
            background: color-mix(in srgb, var(--panel) 88%, black 8%);
            padding: 10px;
            min-height: 320px;
            max-height: 54vh;
            overflow: auto;
            display: grid;
            gap: 10px;
        }
        .message {
            border: 1px solid var(--line);
            border-radius: 10px;
            padding: 9px;
            background: color-mix(in srgb, var(--panel) 90%, black 10%);
        }
        .message .role {
            font-size: 11px;
            color: var(--muted);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: .4px;
        }
        .message.user {
            border-color: color-mix(in srgb, var(--accent) 40%, var(--line) 60%);
            background: color-mix(in srgb, var(--accent) 16%, var(--panel) 84%);
        }
        .message.assistant {
            border-color: color-mix(in srgb, var(--ok) 30%, var(--line) 70%);
        }
        .empty-state {
            border: 1px dashed var(--line);
            border-radius: 10px;
            padding: 16px;
            color: var(--muted);
            text-align: center;
        }
        .composer { display: grid; gap: 9px; }
        .composer textarea { min-height: 110px; }
        .composer-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }
        .hint { color: var(--muted); font-size: 12px; }
        .advanced-block {
            border: 1px solid var(--line);
            border-radius: 10px;
            background: color-mix(in srgb, var(--panel) 94%, black 6%);
        }
        .advanced-block summary {
            cursor: pointer;
            list-style: none;
            font-weight: 700;
            padding: 10px;
        }
        .advanced-block summary::-webkit-details-marker { display: none; }
        .advanced-block > *:not(summary) { padding: 0 10px 10px; }
        .category-grid { display: grid; gap: 10px; }
        .category {
            border: 1px solid var(--line);
            border-radius: 10px;
            background: color-mix(in srgb, var(--panel) 96%, black 4%);
        }
        .category > summary {
            cursor: pointer;
            list-style: none;
            font-weight: 600;
            padding: 8px 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .category > summary::-webkit-details-marker { display: none; }
        .icon-badge {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border: 1px solid color-mix(in srgb, var(--accent) 45%, var(--line) 55%);
            color: var(--accent);
            background: color-mix(in srgb, var(--accent) 18%, var(--panel) 82%);
            font-size: 12px;
            font-weight: 700;
        }
        .field-grid {
            display: grid;
            gap: 8px;
            padding: 0 10px 10px;
        }
        .field-grid label {
            display: grid;
            gap: 5px;
            font-size: 12px;
            color: var(--muted);
        }
        .checks {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            padding-top: 2px;
            color: var(--muted);
            font-size: 12px;
        }
        .checks label {
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .checks input[type="checkbox"] { width: auto; }
        .tool-form { padding: 0 10px 10px; display: grid; gap: 8px; }
        .tool-form.compact { display: block; }
        .tool-actions { display: flex; justify-content: flex-start; }
        h4 {
            margin: 10px 0 6px;
            font-size: 13px;
            color: var(--muted);
            padding: 0 10px;
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
    <div class="shell">
        <header class="topbar">
            <h1 class="brand">Codex Chat</h1>
            <form method="post">
                {% csrf_token %}
                <input type="hidden" name="action" value="set_theme">
                <input type="hidden" name="theme" value="{{ theme_toggle_target|default:'light' }}">
                <button type="submit" class="btn subtle">{{ theme_toggle_label|default:'Toggle theme' }}</button>
            </form>
        </header>
        {% block content %}{% endblock %}
    </div>
</body>
</html>
